<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Singers</title>

    <!-- Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">My Favorite Singers</span>
        </div>
    </nav>

    <!-- PAGE HEADING -->
    <div class="container mt-5">
        <h1 class="text-center">My Favorite Singers</h1>
        <p class="text-center text-muted">Here are the list of singers I love and some information about them.</p>
        <hr>
    </div>

    <!-- MAIN SECTIONS -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-sm-4 text-center">
                <img src="images/music.png" class="my-image">
            </div>

            <!--Table of singers -->
            <div class="col-sm-8">

                <h4>Singer Details</h4>

                <!-- Bootstrap tables -->
                <table class="table table-striped table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Best Song</th>
                            <th>Genre</th>
                            <th>Born</th>
                            <th>Hometown</th>
                        </tr>
                    </thead>
                    <tbody id="singerTable"></tbody>
                </table>

            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center mt-5 py-3">
        <p>Made with Bootstrap 5</p>
    </footer>

    <!-- Bootstrap JavaScrip -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
